services:
  db:
    image: postgres:18
    container_name: eighth_db
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports: 
      - "5432:5432"
    restart: unless-stopped
    volumes:
      - eighth_db_data:/var/lib/postgresql

volumes:
  eighth_db_data: